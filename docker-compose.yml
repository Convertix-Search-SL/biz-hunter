services:
  hermes:
    image: hermes-agent:local  # build local desde el repo de hermes-agent vecino
    container_name: hermes-biz
    env_file: .env
    environment:
      HERMES_UID: "${HERMES_UID:-501}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    volumes:
      # Montamos el repo entero como /opt/biz-hunter para que las skills
      # accedan a data/, strategy/, scripts/.
      - ./:/opt/biz-hunter
      # Skills custom: hermes las descubre en ~/.hermes/skills/
      - ./skills:/root/.hermes/skills/biz-hunter
      # Cron jobs persistentes
      - ./cron:/root/.hermes/cron-config
      # Datos de hermes (sesiones, memoria, state.db) — persistentes
      - ./hermes-data:/root/.hermes
    ports:
      - "8444:8443"  # webhook telegram (8443 ya lo usa el hermes-agent original)
    command: ["gateway", "run"]
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy

  # Proxy LiteLLM: failover Claude API → OpenRouter free como red de seguridad.
  # Si Anthropic da 429 o cae, salta al free de OpenRouter sin romper.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: hermes-biz-litellm
    env_file: .env
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
