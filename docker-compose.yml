services:
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    container_name: biz-hunter-cron
    env_file: .env
    environment:
      BIZ_HUNTER_DB: /opt/biz-hunter/data/opportunities.db
    volumes:
      - ./:/opt/biz-hunter
    restart: unless-stopped

  bot:
    # Listener Telegram long-polling. Recibe callbacks de los botones
    # aprobar/descartar y comandos /status, /run <target>, /help.
    # Reusa la misma imagen que cron (tiene Python + deps).
    build:
      context: .
      dockerfile: Dockerfile.cron
    container_name: biz-hunter-bot
    env_file: .env
    environment:
      BIZ_HUNTER_DB: /opt/biz-hunter/data/opportunities.db
    volumes:
      - ./:/opt/biz-hunter
    command: ["python", "/opt/biz-hunter/scripts/telegram_listener.py"]
    restart: unless-stopped
    depends_on:
      - cron

  # Hermes-biz: deshabilitado por ahora — el listener `bot` toma el polling
  # del Telegram (un solo proceso puede hacer getUpdates a la vez). Si en el
  # futuro queremos reactivar Hermes para conversación libre, parar el bot
  # primero.
  # hermes:
  #   image: hermes-agent:local
  #   container_name: hermes-biz
  #   ...

  # LiteLLM: deshabilitado — los scripts usan Anthropic SDK directo. Si más
  # adelante quieres failover OpenRouter, reactivar y modificar lib/llm.py
  # para apuntar al base_url del proxy.
  # litellm:
  #   image: ghcr.io/berriai/litellm:main-latest
  #   ...
